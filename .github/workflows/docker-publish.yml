name: Docker Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: >-
      (github.event_name != 'push' ||
      (!contains(github.event.head_commit.message || '', '[ci-skip]') &&
      !contains(github.event.head_commit.message || '', '[skip ci]') &&
      !contains(github.event.head_commit.message || '', '[ci skip]') &&
      !contains(github.event.head_commit.message || '', '[no ci]') &&
      !contains(github.event.head_commit.message || '', '[skip actions]') &&
      !contains(github.event.head_commit.message || '', '[actions skip]'))) &&
      (github.event_name != 'pull_request' ||
      (!contains(github.event.pull_request.title || '', '[ci-skip]') &&
      !contains(github.event.pull_request.title || '', '[skip ci]') &&
      !contains(github.event.pull_request.title || '', '[ci skip]') &&
      !contains(github.event.pull_request.title || '', '[no ci]') &&
      !contains(github.event.pull_request.title || '', '[skip actions]') &&
      !contains(github.event.pull_request.title || '', '[actions skip]')))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          tags="$(CI_REF="${GITHUB_REF}" CI_SHA="${GITHUB_SHA}" sh scripts/tags.sh)"
          echo "value=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/outline-vpn-docker
          IMAGE_TAGS: ${{ steps.tags.outputs.value }}
          PUSH_IMAGE: "false"
        run: sh scripts/build.sh

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main/tags)
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/outline-vpn-docker
          IMAGE_TAGS: ${{ steps.tags.outputs.value }}
          PUSH_IMAGE: "true"
        run: sh scripts/build.sh
