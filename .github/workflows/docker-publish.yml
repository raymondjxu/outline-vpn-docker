name: Docker Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          tags="$(CI_REF="${GITHUB_REF}" CI_SHA="${GITHUB_SHA}" sh scripts/tags.sh)"
          echo "value=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build (PR)
        if: github.event_name == 'pull_request'
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/outline-vpn-docker
          IMAGE_TAGS: ${{ steps.tags.outputs.value }}
          PUSH_IMAGE: "false"
        run: sh scripts/build.sh

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main/tags)
        if: github.event_name != 'pull_request'
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/outline-vpn-docker
          IMAGE_TAGS: ${{ steps.tags.outputs.value }}
          PUSH_IMAGE: "true"
        run: sh scripts/build.sh
